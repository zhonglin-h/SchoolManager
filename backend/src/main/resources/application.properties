logging.level.com.school=DEBUG

spring.datasource.url=jdbc:h2:file:./data/schooldb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

google.client-secret.path=./client_secret.json
app.attendance.late-buffer-minutes=5
app.dashboard.upcoming-checks-limit=10
app.principal.google-user-id=
app.notifications.enabled=false
app.notifications.email.enabled=true
app.autojoin.enabled=false
app.autojoin.provider=noop
app.autojoin.trigger-offset-seconds=60
app.autojoin.join-timeout-seconds=30
app.autojoin.chrome-profile-dir=
app.autojoin.chrome-path=
app.autojoin.retry-max-attempts=2
app.autojoin.retry-backoff-ms=500
app.autojoin.notify-on-success=false
app.autojoin.require-principal-profile-signed-in=true
app.autojoin.skip-if-meeting-active=false

# Set to true to skip real Google Meet API calls during local development.
# app.meet.mock.active-emails: comma-separated list of emails treated as present.
# Leave blank to simulate an empty meeting (tests absent/not-joined notifications).
app.meet.mock=true
app.meet.mock.active-names=

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

telegram.bot-token=
telegram.chat-id=
