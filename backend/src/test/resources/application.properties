spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

app.notifications.enabled=true
app.principal.email=principal@test.com
app.attendance.late-buffer-minutes=5
app.meet.mock=true
app.meet.mock.active-emails=
app.autojoin.enabled=false
app.autojoin.provider=noop
app.autojoin.trigger-offset-seconds=60
app.autojoin.join-timeout-seconds=5
app.autojoin.retry-max-attempts=1
app.autojoin.retry-backoff-ms=1

google.client-secret.path=./client_secret.json
