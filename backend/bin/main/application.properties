spring.datasource.url=jdbc:h2:file:./data/schooldb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

google.client-secret.path=./client_secret.json
google.calendar.id=principal@school.com

app.principal.email=principal@school.com
app.attendance.end-buffer-minutes=5

# Set to true to skip real Google Meet API calls during local development.
# app.meet.mock.active-emails: comma-separated list of emails treated as present.
# Leave blank to simulate an empty meeting (tests absent/not-joined notifications).
app.meet.mock=true
app.meet.mock.active-emails=

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=school@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
